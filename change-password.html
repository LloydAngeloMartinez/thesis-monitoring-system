<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Change Password</title>
    <link rel="icon" type="image/png" href="assets/img/neust_logo.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i&amp;display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.tablesorter/2.31.2/css/theme.bootstrap_4.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    <link rel="stylesheet" href="assets/css/general-style.css">
</head>
<body class="bg-neust d-flex justify-content-center align-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-12 col-xl-10">
                <div class="card shadow-lg o-hidden border-0 my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-flex">
                                <div class="flex-grow-1 bg-password-image" style="background:url(&quot;assets/img/primary-img/3293465.jpg&quot;) top / cover no-repeat, rgba(26,77,46,0);"></div>
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h4 class="text-dark mb-2">Change Your Password?</h4>
                                        <p class="mb-4"></p>
                                    </div>
                                    <form class="user" method="post">
                                        <div id="passwordMessage" style="color: red; font-size: small;"></div>
                                        <div class="mb-3">
                                            <input class="passwordField form-control form-control-user" type="password" placeholder="Type your new password" name="password"  required minlength="8" maxlength="12" >
                                            <input class="passwordField form-control form-control-user" type="password" placeholder="Confirm password" name="password_repeat"  required minlength="8" maxlength="12" >
                                        </div>
                                        <div class="mb-3">
                                            <div class="form-check">
                                                <input class="custom-control-input" type="checkbox" id="formCheck-1"> 
                                                <label class="small" for="formCheck-1" id="pass-info">Show Password</label>
                                            </div>
                                        </div>
                                            <button class="btn btn-dark d-block btn-user w-100" type="submit" style="background: #0a3981;" name="change-pass">Change Password</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/theme.js"></script>
</body>

</html>
