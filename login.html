<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login - Collaborate</title>
    <link rel="icon" type="image/png" href="assets/img/neust_logo.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i&amp;display=swap">
    <link rel="stylesheet" href="assets/css/Lightbox-Gallery-baguetteBox.min.css">
    <link rel="stylesheet" href="assets/css/Navbar-Centered-Links-icons.css">
    <link rel="stylesheet" href="assets/css/index-style.css">
</head>

<body>
    <nav class="navbar navbar-expand-md bg-body py-3">
        <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="bs-icon-sm bs-icon-rounded bs-icon-primary d-flex justify-content-center align-items-center me-3 bs-icon bg-white">
                    <img src="assets/img/neust_logo.png" style="height: 55px;width: 55px;" />
                </span>
                    <span class="fs-3 text-white fw-bold">Collaborate</span>
                </a>
            <button data-bs-toggle="collapse" class="navbar-toggler" data-bs-target="#navcol-3">
                <span class="visually-hidden">Toggle navigation</span>
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse fs-4" id="navcol-3">
                <ul class="navbar-nav mx-auto">
                    
                </ul>
                <a class="btn btn-warning link-light fw-bolder" href="register.html" type="button">Register now!</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-12 col-xl-10">
                <div class="card shadow-lg o-hidden border-0 my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-flex">
                                <div class="flex-grow-1 bg-login-image" style="background-image: url(&quot;assets/img/primary-img/6343845.jpg&quot;);"></div>
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h4 class="text-dark mb-4">Welcome Back!</h4>
                                        <span class="text-danger small" id="emailMessage">  </span>
                                    </div>
                                    <form method="post" class="user">
                                        <div class="mb-3">
                                            <input class="form-control text-dark" type="email" id="email" required  placeholder="Email" name="email" autocomplete="off"></div>
                                        <div class="mb-3">
                                            <input class="form-control text-dark" type="password" id="passwordField" required placeholder="Password" name="password" autocomplete="off" minlength="8" maxlength="15"></div>
                                        <div class="mb-3">
                                            <div class="custom-control custom-checkbox small">
                                                <div class="form-check">
                                                    <input class="form-check-input custom-control-input" type="checkbox" id="formCheck-1">
                                                    <label class="" id="pass-info">Show Password</label>
                                                </div>
                                            </div> 
                                        </div>
                                        <button class="btn btn-secondary d-block btn-user w-100 mb-2" role="button" style="background: #0a3981;" name="login" >Login</button>
                                        <hr>
                                    </form>
                                    <div class="text-center"><a class="small" href="forgot-password">Forgot Password?</a></div>
                                    <div class="text-center"><a class="small" href="register">Create an Account!</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/Lightbox-Gallery-baguetteBox.min.js"></script>
    <script src="assets/js/Lightbox-Gallery.js"></script>
    <script src="assets/js/theme.js"></script>
</body>

</html>
